name: imas
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2 
  video_player: ^2.9.2
  provider: ^6.1.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  firebase_database: ^11.1.0
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_sign_in: ^6.2.2
  flutter_pdfview: ^1.3.2
  pdf: ^3.10.8
  printing: ^5.11.1
  http: ^1.2.1
  flutter_webrtc: ^1.4.1
  mqtt_client: ^10.5.1
  path_provider: ^2.1.3
  fl_chart: ^0.70.2
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/imas_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
    - assets/docs/
